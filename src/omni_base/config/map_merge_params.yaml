map_merge:
  ros__parameters:
    # We do NOT know where Farhan and Rancho are starting relative to each other
    known_init_poses: false 
    
    # How often (in Hz) to attempt stitching the maps together
    merging_rate: 0.5 
    discovery_rate: 0.05
    estimation_rate: 0.1
    estimation_confidence: 1.0
    
    # The node will automatically look for /rancho/map and /farhan/map
    robot_map_topic: "map"
    robot_namespace: ""
    
    # What to output once stitched
    merged_map_topic: "global_map"
    world_frame: "global_map"
